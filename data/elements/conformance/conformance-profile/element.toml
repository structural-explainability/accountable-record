schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/conformance/conformance-profile"
persistent_id = "urn:ar:se:accountable-record:conformance:conformance-profile"
compact_id = "se.accountable-record.conformance.conformance-profile"
local_name = "conformance-profile"
label = "Conformance Profile"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "conformance"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A declared set of requirements, element packages, element types, claims,
traits, mappings, checks, verifier expectations, fixtures, and expected
reports used to evaluate a class of Accountable Record artifacts.
"""
plain_language = """
A declared set of things to load and check when deciding whether a record,
bundle, package, or system satisfies a particular Accountable Record profile.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.conformance.requirement >=0.1.0",
  "se.accountable-record.conformance.conformance-check >=0.1.0",
  "se.accountable-record.verification.verifier-expectation >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
