Earlier drafts described this as declaring accountable entity kinds using
canonical `AE.*` identifiers.
"""
related_elements = [
  "se.accountable-record.subjects.subject-kind",
]

[[requirements]]
id = "level-3.traits-declared"
level = "level-3"
label = "Traits are declared"
status = "working-draft"
mandatory = true
description = """
The system declares AR traits for record types.
"""
related_elements = [
  "se.accountable-record.traits.trait",
]

[[requirements]]
id = "level-3.field-mappings-present"
level = "level-3"
label = "Field mappings are present"
status = "working-draft"
mandatory = true
description = """
The system provides field mappings needed to verify trait conformance.
"""
related_elements = [
  "se.accountable-record.mappings.field-mapping",
  "se.accountable-record.mappings.field-role",
]

[[requirements]]
id = "level-4.transformations-declared"
level = "level-4"
label = "Transformations are declared"
status = "working-draft"
mandatory = true
description = """
The system declares transformations.
"""
related_elements = [
  "se.accountable-record.relations.derivation",
  "se.accountable-record.provenance.derivation-event",
]

[[requirements]]
id = "level-4.transformation-behavior-verified"
level = "level-4"
label = "Transformation behavior is verified"
