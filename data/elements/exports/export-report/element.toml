schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/exports/export-report"
persistent_id = "urn:ar:se:accountable-record:exports:export-report"
compact_id = "se.accountable-record.exports.export-report"
local_name = "export-report"
label = "Export Report"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "exports"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A machine-readable report artifact emitted by a verifier after checking a
bundle against the selected claim set, profile, element packages, maturity
level, and verifier configuration.
"""
plain_language = """
A report file produced after a verifier checks a bundle.
"""
[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.conformance.conformance-report >=0.1.0",
  "se.accountable-record.verification.report-production >=0.1.0",
  "se.accountable-record.verification.verifier-identity >=0.1.0",
  "se.accountable-record.exports.export-envelope >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
