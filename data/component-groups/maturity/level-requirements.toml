  "se.accountable-record.exports.export-bundle",
]

[[requirements]]
id = "level-0.records-have-stable-ids"
level = "level-0"
label = "Records have stable IDs"
status = "working-draft"
mandatory = true
description = """
Records in the bundle have stable identifiers.
"""
