schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/conformance/compatibility-fixture"
persistent_id = "urn:ar:se:accountable-record:conformance:compatibility-fixture"
compact_id = "se.accountable-record.conformance.compatibility-fixture"
local_name = "compatibility-fixture"
label = "Compatibility Fixture"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "conformance"

[release]
version = "0.1.0"
status = "working-draft"
immutable = false

[definition]
description = """
A canonical example, bundle, element instance, profile, report, expected
report, or test case used to check whether independent implementations
preserve Accountable Record conformance semantics.
"""
plain_language = """
A shared test example used to make sure different tools produce compatible
results.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.conformance.expected-report >=0.1.0",
  "se.accountable-record.conformance.conformance-report >=0.1.0",
  "se.accountable-record.conformance.claim-outcome >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
