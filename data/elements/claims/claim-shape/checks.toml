schema = "ar-element-checks-1"

element_type_id = "se.accountable-record.claims.claim-shape"

[[checks]]
id = "claim_shape.has-element-type-id"
label = "Has element type ID"
level = "required"
description = """
A claim-shape instance must identify the element type it conforms to.
"""

[[checks]]
id = "claim_shape.has-instance-id"
label = "Has instance ID"
level = "required"
description = """
A claim-shape instance must have a stable element instance identifier.
"""

[[checks]]
id = "claim_shape.has-shape-value"
label = "Has shape value"
level = "required"
description = """
A claim-shape instance must declare the machine-readable shape value.
"""
