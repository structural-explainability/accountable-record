schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/conformance/conformance-declaration"
persistent_id = "urn:ar:se:accountable-record:conformance:conformance-declaration"
compact_id = "se.accountable-record.conformance.conformance-declaration"
local_name = "conformance-declaration"
label = "Conformance Declaration"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "conformance"

[release]
version = "0.1.0"
status = "working-draft"
immutable = false

[definition]
description = """
A declaration made by a bundle, profile, package, system, or exported artifact
about its intended AR contract version, target maturity level, profile,
producing system version, or related conformance target. A conformance
declaration is a target claim, not proof of achieved conformance.
"""
plain_language = """
A statement about what level, profile, or contract version something is trying
to satisfy.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.identity.version >=0.1.0",
  "se.accountable-record.maturity.maturity-level >=0.1.0",
  "se.accountable-record.conformance.conformance-profile >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
