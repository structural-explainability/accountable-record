[definition]
description = """
A prohibited extension pattern for exported Accountable Record artifacts, such
as overriding required fields, redefining required AR semantics, using reserved
AR keys, or omitting required fields because they are outside a selected
package or profile concern.
"""
plain_language = """
A kind of extension that AR does not allow.
"""

