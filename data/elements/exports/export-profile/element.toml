schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/exports/export-profile"
persistent_id = "urn:ar:se:accountable-record:exports:export-profile"
compact_id = "se.accountable-record.exports.export-profile"
local_name = "export-profile"
label = "Export Profile"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "exports"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A machine-readable profile artifact exported by an Accountable Record project,
domain system, local system, proprietary system, or external package to define
the claim set, structural commitments, selected element packages, record
types, field mappings, transformations, and profile-specific conformance rules
for a verification run.
"""
plain_language = """
A profile file that tells a verifier what to load, what to check, and what
rules apply.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.conformance.conformance-profile >=0.1.0",
  "se.accountable-record.conformance.claim-selection >=0.1.0",
  "se.accountable-record.exports.export-envelope >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
