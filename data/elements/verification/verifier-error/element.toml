schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/verification/verifier-error"
persistent_id = "urn:ar:se:accountable-record:verification:verifier-error"
compact_id = "se.accountable-record.verification.verifier-error"
local_name = "verifier-error"
label = "Verifier Error"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "verification"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A verifier-level error that prevents verification from producing an AR report,
such as unreadable input, parse failure, missing external profile, or invalid
verifier configuration. Verifier-level errors are not claim outcomes.
"""
plain_language = """
An error that stops the verifier before it can produce a report.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
