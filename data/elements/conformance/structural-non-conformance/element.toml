schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/conformance/structural-non-conformance"
persistent_id = "urn:ar:se:accountable-record:conformance:structural-non-conformance"
compact_id = "se.accountable-record.conformance.structural-non-conformance"
local_name = "structural-non-conformance"
label = "Structural Non Conformance"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "conformance"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A structural conformance state in which a bundle, profile, package, report, or
other Accountable Record artifact fails to satisfy one or more mandatory AR
requirements for its declared maturity level, profile, or selected check set.
"""
plain_language = """
A structural failure to meet required Accountable Record checks.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.conformance.claim-outcome >=0.1.0",
  "se.accountable-record.conformance.conformance-check >=0.1.0",
  "se.accountable-record.conformance.conformance-report >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
