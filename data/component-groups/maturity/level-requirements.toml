  "se.accountable-record.sources.source",
  "se.accountable-record.references.source-reference",
]

[[requirements]]
id = "level-1.provenance-links-preserved"
level = "level-1"
label = "Provenance links are preserved"
status = "working-draft"
mandatory = true
description = """
The system preserves provenance links sufficiently for records to be inspected
against source material and derivation history.
"""
related_elements = [
  "se.accountable-record.provenance.provenance-event",
]

[[requirements]]
id = "level-2.subject-kinds-declared"
level = "level-2"
label = "Subject kinds are declared"
status = "working-draft"
mandatory = true
description = """
The system declares accountable subject kinds for relevant records.
"""
