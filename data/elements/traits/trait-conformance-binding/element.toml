schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/traits/trait-conformance-binding"
persistent_id = "urn:ar:se:accountable-record:traits:trait-conformance-binding"
compact_id = "se.accountable-record.traits.trait-conformance-binding"
local_name = "trait-conformance-binding"
label = "Trait Conformance Binding"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "traits"

[release]
version = "0.1.0"
status = "working-draft"
immutable = false

[definition]
description = """
A binding that connects a declared trait, record type, structural role,
field mapping, and verifier check so that trait conformance can be assessed
for the declared record-type and trait pair.
"""
plain_language = """
The connection that tells a verifier how to check whether a record type
satisfies a declared trait.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.traits.trait >=0.1.0",
  "se.accountable-record.traits.trait-declaration >=0.1.0",
  "se.accountable-record.traits.trait-requirement >=0.1.0",
  "se.accountable-record.mappings.field-mapping >=0.1.0",
  "se.accountable-record.claims.claim >=0.1.0",
]

