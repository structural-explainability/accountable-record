schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/verification/verifier-identity"
persistent_id = "urn:ar:se:accountable-record:verification:verifier-identity"
compact_id = "se.accountable-record.verification.verifier-identity"
local_name = "verifier-identity"
label = "Verifier Identity"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "verification"

[release]
version = "0.1.0"
status = "working-draft"
immutable = false

[definition]
description = """
Identity metadata recorded in a report to identify the verifier that produced
the report, including verifier ID, version, implementation URL, and any
implementation-specific metadata needed for inspection.
"""
plain_language = """
Information that says which verifier produced a report.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.identity.identifier >=0.1.0",
  "se.accountable-record.identity.version >=0.1.0",
  "se.accountable-record.references.uri-reference >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
