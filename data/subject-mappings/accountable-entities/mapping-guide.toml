schema = "ar-subject-mapping-guide-1"

[identity]
id = "accountable-entities"
label = "Accountable Entities Subject Mapping"
status = "working-draft"

[definition]
description = """
A mapping guide for using accountable-entity profile vocabularies as external
subject classification systems within Accountable Record profiles.
"""
plain_language = """
A guide for mapping accountable-entity profile terms into AR subject structure.
"""

[semantics]
ar_owns_subject_structure = true
external_vocabulary_is_not_ar_canonical = true
profiles_may_map_external_vocabularies = true
mappings_are_explicit_machine_readable_and_citable = true

[scope]
description = """
This guide supports profiles that want to classify record subjects using
accountable-entity profile vocabulary while preserving AR's subject-oriented
neutrality. The external vocabulary may be used by a profile to guide record
typing, trait declarations, field mappings, transformation checks, or failure
mode detection.
"""

[profile_responsibilities]
must_declare_vocabulary = true
must_declare_mapping = true
must_use_citable_external_identifiers = true
must_not_redefine_external_identifiers = true
may_use_subset_of_external_vocabulary = true
must_not_make_external_vocabulary_ar_canonical = true

[files]
subject_kind_map = "subject-kind-map.toml"
questions = "questions.toml"
examples = "examples/"

[boundary]
description = """
A profile may use accountable-entity mappings to explain how its record types
relate to subject kinds. The mapping does not make accountable-entity
vocabulary AR-owned ontology.
"""
