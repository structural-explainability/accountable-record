checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.traits.trait-declaration >=0.1.0",
  "se.accountable-record.traits.trait-requirement >=0.1.0",
  "se.accountable-record.traits.trait-conformance-binding >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
