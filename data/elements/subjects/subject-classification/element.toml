schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/subjects/subject-classification"
persistent_id = "urn:ar:se:accountable-record:subjects:subject-classification"
compact_id = "se.accountable-record.subjects.subject-classification"
local_name = "subject-classification"
label = "Subject Classification"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "subjects"

[release]
version = "0.1.0"
status = "working-draft"
immutable = false

[definition]
description = """
A classification assigned to a record subject by a profile, domain vocabulary,
external vocabulary, mapping guide, verifier, or other declared authority.
Subject classifications are explicit claims or declarations about a subject;
they are not AR-owned ontology commitments.
"""
plain_language = """
A category assigned to the subject of a record.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.subjects.record-subject >=0.1.0",
  "se.accountable-record.subjects.subject-kind >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
