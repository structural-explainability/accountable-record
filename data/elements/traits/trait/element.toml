A declarative commitment or structural guarantee that a record type, profile,
or element package can declare and that a verifier can assess through
trait-conformance checks.
"""
plain_language = """
A guarantee that a record type says it supports.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
