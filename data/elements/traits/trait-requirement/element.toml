schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/traits/trait-requirement"
persistent_id = "urn:ar:se:accountable-record:traits:trait-requirement"
compact_id = "se.accountable-record.traits.trait-requirement"
local_name = "trait-requirement"
label = "Trait Requirement"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "traits"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A verifiable requirement that belongs to a trait and contributes to
trait-conformance assessment for a record type, profile, element package, or
declared structural role.
"""
plain_language = """
One checkable requirement that a trait expects a record type to satisfy.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.traits.trait >=0.1.0",
  "se.accountable-record.verification.result >=0.1.0",
  "se.accountable-record.conformance.conformance-outcome >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
