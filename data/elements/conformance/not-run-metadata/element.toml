schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/conformance/not-run-metadata"
persistent_id = "urn:ar:se:accountable-record:conformance:not-run-metadata"
compact_id = "se.accountable-record.conformance.not-run-metadata"
local_name = "not-run-metadata"
label = "Not Run Metadata"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "conformance"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
Metadata describing a claim that did not receive an outcome because it was not
selected, was outside the requested maturity level or profile, was optional
and not selected, had absent preconditions, or was not applicable to the
bundle.
"""
plain_language = """
Information explaining why a claim was not checked.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.claims.claim >=0.1.0",
  "se.accountable-record.conformance.claim-selection >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
