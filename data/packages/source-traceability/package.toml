persistent_id = "urn:ar:se:accountable-record:packages:source-traceability"
compact_id = "se.accountable-record.packages.source-traceability"
local_name = "source-traceability"
label = "Source Traceability"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[release]
