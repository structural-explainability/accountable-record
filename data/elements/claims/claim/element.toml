schema = "ar-element-type-1"

[identity]
canonical_uri = "https://structural-explainability.org/accountable-record/elements/claims/claim"
persistent_id = "urn:ar:se:accountable-record:claims:claim"
compact_id = "se.accountable-record.claims.claim"
local_name = "claim"
label = "Claim"

[namespace]
authority = "structural-explainability.org"
authority_alias = "se"
project = "accountable-record"

[classification]
artifact_kind = "element-type"
component_group = "claims"

[release]
version = "0.3.0"
status = "working-draft"
immutable = false

[definition]
description = """
A verifier check preserved within an Accountable Record contract. A claim has
a stable identifier, declared shape, owning namespace, applicability rules,
maturity or profile assignment, mandatory or optional status, and
machine-readable definition.
"""
plain_language = """
A check that a verifier can run against a bundle, record, profile, or other
Accountable Record artifact.
"""

[identity_rules]
element_type_id_field = "element_type_id"
element_instance_id_field = "element_instance_id"

[structure]
schema = "schema.schema.json"
checks = "checks.toml"
examples = "examples/"

[compatibility]
breaking_changes_require_new_major = true
requires = [
  "se.accountable-record.verification.result >=0.1.0",
  "se.accountable-record.conformance.conformance-outcome >=0.1.0",
]

[deprecation]
deprecated = false
successor = ""

[stewardship]
maintainer = "Structural Explainability"
status = "active"

[hosting]
provider = "github"
organization = "structural-explainability"
repository = "accountable-record"
url = "https://github.com/structural-explainability/accountable-record"
